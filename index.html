<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #000;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 40px;
            justify-content: center;
            align-items: center;
        }

        .container3d {
            perspective: 1000px;
        }

        .card {
            /* width: 400px;
            height: 240px; */
            background-color: #6f4e99;
            border-radius: 24px;
            transition: transform .3s;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            border-top: 2px solid #ffffff30;
            border-left: 2px solid #ffffff30;
        }

        .debitCard {
            width: 400px;
            height: 240px;
            transition: transform 1s linear;
        }

        .cardTurned {
            transform: rotate3d(0, 1, 0, 180deg);
        }

        /* .card:hover {
            transform: rotate3d(0, 1, 0, 30deg);
        } */
    </style>
    <title>3d effects</title>
</head>

<body>
    <div class="container container3d">
        <div class="card" id="card">
            <h1>Bank card</h1>
        </div>

        <div class="card debitCard" id="debitCard">
            <h1>Debit card</h1>
        </div>
    </div>
</body>
<script>
    const card = document.getElementById('card');
    const debitCard = document.getElementById('debitCard');

    const CARD_WIDTH = 400;
    const CARD_HEIGHT = 240;
    const K = 60;

    card.style.width = `${CARD_WIDTH}px`;
    card.style.height = `${CARD_HEIGHT}px`;

    function setTransition(duration, type) {
        card.style.transition = `transform ${duration}s ${type}`;
    }

    function getRotate3d(horizontalDirection, verticalDirection, angle) {
        const rotateX = verticalDirection * K;
        const rotateY = horizontalDirection * K;

        return [rotateX, rotateY]
    }

    // Для наклона только по оси Y
    // card.addEventListener('mousemove', function (event) {
    //     const posX = event.clientX - card.offsetLeft;
    //     const posY = event.clientY - card.offsetTop;

    //     if (posX < (CARD_WIDTH / 2 - 10)) {
    //         card.style.transform = 'rotate3d(0, 1, 0, -30deg)';
    //     }

    //     if (posX > (CARD_WIDTH / 2 - 10) && posX < (CARD_WIDTH / 2 + 10)) {
    //         card.style.transform = 'rotate3d(0, 1, 0, 0deg)';
    //     }

    //     if (posX > (CARD_WIDTH / 2 + 10)) {
    //         card.style.transform = 'rotate3d(0, 1, 0, 30deg)';
    //     }
    // });

    function tilt(event) {
        let horizontalDirection = 0;
        let verticalDirection = 0;
        const isTurned = card.classList.contains('cardTurned');

        const posX = event.clientX - card.offsetLeft;
        const posY = event.clientY - card.offsetTop;

        horizontalDirection = (posX - CARD_WIDTH / 2) / CARD_WIDTH;
        verticalDirection = -(posY - CARD_HEIGHT / 2) / CARD_HEIGHT;

        let [rotateX, rotateY] = getRotate3d(horizontalDirection, verticalDirection, 30);

        const flip = isTurned ? 'rotateY(180deg)' : '';
        card.style.transform = `${flip} rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    }

    card.addEventListener('mousemove', (event) => {
        setTransition(0.3, 'ease-out');
        tilt(event);
    });

    card.addEventListener('click', function(event) {
        setTransition(1, 'linear');

        const isTurned = card.classList.contains('cardTurned');
        
        if (isTurned) {
            card.classList.remove('cardTurned');
            
            setTimeout(function() {
                card.innerHTML = '<h1>Bank card</h1>';
                card.style.backgroundColor = '#6f4e99';
            }, 500)
        } else {
            card.classList.add('cardTurned');

            setTimeout(function() {
                card.innerHTML = '<h1 style="transform: rotateY(180deg)"">Back layout v2</h1>';
                card.style.backgroundColor = '#9b9b9b';
            }, 500)
        }

        tilt(event);
    });

    card.addEventListener('mouseleave', function() {
        const isTurned = card.classList.contains('cardTurned');
        const flip = isTurned ? 'rotateY(180deg)' : '';
        card.style.transform = `${flip} rotateX(0deg) rotateY(0deg)`;
    });

    debitCard.addEventListener('click', function() {
        const isDebitCardTurned = debitCard.classList.contains('cardTurned');
        
        if (isDebitCardTurned) {
            debitCard.classList.remove('cardTurned');

            setTimeout(function() {
                debitCard.innerHTML = '<h1>Debit card</h1>';
                debitCard.style.backgroundColor = '#6f4e99';
            }, 500)
        } else {
            debitCard.classList.add('cardTurned');

            setTimeout(function() {
                debitCard.innerHTML = '<h1 style="transform: rotateY(180deg)">Back layout</h1>';
                debitCard.style.backgroundColor = '#9b9b9b';
            }, 500)
        }
    });
</script>

</html>
